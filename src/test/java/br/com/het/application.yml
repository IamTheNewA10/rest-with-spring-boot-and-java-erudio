server:
  port: 8888

cors:
  originPatterns: http://localhost:8080,"http://localhost:3000"

spring:
  application:
    name: rest-with-spring-boot-and-java-erudio
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  docker:
    compose:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false

logging:
  level:
    root: info
    br.com.het: DEBUG

spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true
